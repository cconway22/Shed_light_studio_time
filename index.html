<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLS Time - Stained Glass Tracker</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX Support in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .dropdown-shadow { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        // --- 1. FIREBASE IMPORTS ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const { useState, useEffect, useRef } = React;

        // --- 2. CONFIGURATION ---
        // IMPORTANT: Replace these placeholders with your actual Firebase credentials
        const firebaseConfig = {
            apiKey: "AIzaSyDmB57IdqYwmR7vb6hlJMNBTjDPuvDZt3E",
            authDomain: "shed-light-studio-time.firebaseapp.com",
            projectId: "shed-light-studio-time",
            storageBucket: "shed-light-studio-time.firebasestorage.app",
            messagingSenderId: "683241113812",
            appId: "1:683241113812:web:9f6e054359ac6f10de9341",
            measurementId: "G-5JZWKBLNYP"
        };

        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxdZptyfZAeYPo85Vd4jK5ZsNcrfCUUHGsOt-RmDnWnjlIkmeTN1jNoocR5JpBILKwX/exec";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'stained-glass-timer-v2';

        const PHASES = [
            "Cementing and waterproofing",
            "Cleaning & patina",
            "Copper foiling",
            "Cutting",
            "Design and patterning",
            "Framing & installation",
            "Glass selection",
            "Grinding & fitting",
            "Lead",
            "Line work",
            "Research",
            "Sketching",
            "Soldering",
            "Watercolor"
        ].sort();

        // --- COMPONENTS ---
        const SLSLogo = ({ className = "w-8 h-8" }) => (
            <svg viewBox="0 0 100 100" className={className} fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 5 L95 28 V95 H5 V28 L50 5Z" fill="white" stroke="black" strokeWidth="4" strokeLinejoin="round"/>
                <path d="M50 5 L95 28 L50 45 L5 28 L50 5Z" fill="#888" stroke="black" strokeWidth="2"/>
                <path d="M5 28 L50 45 L5 65 V28Z" fill="#BBB" stroke="black" strokeWidth="2"/>
                <path d="M95 28 L50 45 L95 65 V28Z" fill="#BBB" stroke="black" strokeWidth="2"/>
                <path d="M5 65 L50 45 L50 95 H5 V65Z" fill="#EEE" stroke="black" strokeWidth="2"/>
                <path d="M95 65 L50 45 L50 95 H95 V65Z" fill="#EEE" stroke="black" strokeWidth="2"/>
                <line x1="50" y1="5" x2="50" y2="45" stroke="black" strokeWidth="4" />
                <path d="M35 45 A15 15 0 0 1 65 45 Z" fill="black" />
                <circle cx="50" cy="48" r="8" fill="white" stroke="black" strokeWidth="2" />
            </svg>
        );

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                clock: <path d="M12 6v6l4 2" />,
                plus: <path d="M12 5v14M5 12h14" />,
                search: (
                    <React.Fragment>
                        <circle cx="11" cy="11" r="8"/>
                        <path d="m21 21-4.3-4.3"/>
                    </React.Fragment>
                ),
                camera: (
                    <React.Fragment>
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                        <circle cx="12" cy="13" r="4"/>
                    </React.Fragment>
                ),
                left: <path d="M15 18l-6-6 6-6" />,
                pause: (
                    <React.Fragment>
                        <rect x="6" y="4" width="4" height="16"/>
                        <rect x="14" y="4" width="4" height="16"/>
                    </React.Fragment>
                ),
                wallet: (
                    <React.Fragment>
                        <path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"/>
                        <path d="M4 6v12a2 2 0 0 0 2 2h14v-4"/>
                        <path d="M18 12a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4v-4h-4z"/>
                    </React.Fragment>
                ),
                settings: (
                    <React.Fragment>
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </React.Fragment>
                ),
                trash: <path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2m-6 5v6m4-6v6"/>,
                sheet: (
                    <React.Fragment>
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                        <polyline points="10 9 9 9 8 9"/>
                    </React.Fragment>
                ),
                link: <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />,
                dollar: <path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />,
                chevronDown: <path d="m6 9 6 6 6-6"/>,
                tag: <path d="M12 2H2v10l9.29 9.29c.94.94 2.48.94 3.42 0l6.58-6.58c.94-.94.94-2.48 0-3.42L12 2zM7 7h.01"/>
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [projects, setProjects] = useState([]);
            const [currentView, setCurrentView] = useState('dashboard');
            const [activeProject, setActiveProject] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTimer, setActiveTimer] = useState(null);
            const [timeLogs, setTimeLogs] = useState([]);
            const [uploading, setUploading] = useState(false);
            const [syncingSheet, setSyncingSheet] = useState(false);
            const [showRateEditor, setShowRateEditor] = useState(false);
            const [detailTab, setDetailTab] = useState('history');
            const [elapsedTime, setElapsedTime] = useState(0);
            const [deletingProjectId, setDeletingProjectId] = useState(null);
            const [showLinkModal, setShowLinkModal] = useState(false);
            const [phaseSearch, setPhaseSearch] = useState("");
            const [showPhaseDropdown, setShowPhaseDropdown] = useState(false);

            const timerRef = useRef(null);
            const dropdownRef = useRef(null);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                        setShowPhaseDropdown(false);
                    }
                };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            useEffect(() => {
                const initAuth = async () => {
                    try { await signInAnonymously(auth); } 
                    catch (err) { console.error("Auth error:", err); }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const q = collection(db, 'artifacts', appId, 'public', 'data', 'projects');
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const projs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setProjects(projs);
                    if (activeProject) {
                        const updated = projs.find(p => p.id === activeProject.id);
                        if (updated) setActiveProject(updated);
                    }
                });
                return () => unsubscribe();
            }, [user, activeProject?.id]);

            useEffect(() => {
                if (!user || !activeProject) return;
                const q = collection(db, 'artifacts', appId, 'public', 'data', 'logs');
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const allLogs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    const projectLogs = allLogs
                        .filter(log => log.projectId === activeProject.id)
                        .sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                    setTimeLogs(projectLogs);
                });
                return () => unsubscribe();
            }, [user, activeProject?.id]);

            useEffect(() => {
                if (activeTimer) {
                    timerRef.current = setInterval(() => {
                        setElapsedTime(Math.floor((Date.now() - activeTimer.startTime) / 1000));
                    }, 1000);
                } else {
                    clearInterval(timerRef.current);
                    setElapsedTime(0);
                }
                return () => clearInterval(timerRef.current);
            }, [activeTimer]);

            const formatTime = (seconds) => {
                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60);
                const s = seconds % 60;
                return `${h > 0 ? h + 'h ' : ''}${m}m${h === 0 ? ' ' + s + 's' : ''}`;
            };

            const calculateEarnedForLog = (log, proj) => {
                if (log.type !== 'time' || !proj) return 0;
                const rate = proj.phaseRates?.[log.phase] ?? proj.hourlyRate ?? 0;
                return (log.duration / 3600) * rate;
            };

            const getStats = (logs, proj = activeProject) => {
                if (!proj) return { displayTime: '0m', earned: '$0.00', materialCost: '$0.00', totalValue: '$0.00' };
                const tLogs = logs.filter(l => l.type === 'time');
                const eLogs = logs.filter(l => l.type === 'expense');
                const totalSeconds = tLogs.reduce((acc, l) => acc + (l.duration || 0), 0);
                const earned = tLogs.reduce((acc, l) => {
                    const rate = proj.phaseRates?.[l.phase] ?? proj.hourlyRate ?? 0;
                    return acc + ((l.duration / 3600) * rate);
                }, 0);
                const materialCost = eLogs.reduce((acc, l) => acc + (l.amount || 0), 0);
                const totalValue = earned + materialCost;
                const h = Math.floor(totalSeconds / 3600), m = Math.floor((totalSeconds % 3600) / 60);
                const format = (val) => val.toLocaleString('en-US', { style: 'currency', currency: 'USD' });
                return {
                    displayTime: `${h > 0 ? h + 'h ' : ''}${m}m`,
                    earned: format(earned),
                    materialCost: format(materialCost),
                    totalValue: format(totalValue)
                };
            };

            const handleCreateProject = async (e) => {
                e.preventDefault();
                setSyncingSheet(true);
                const formData = new FormData(e.target);
                const name = formData.get('name');
                const client = formData.get('client');
                const defaultRate = parseFloat(formData.get('rate')) || 0;
                const phaseRates = {};
                PHASES.forEach(p => { phaseRates[p] = defaultRate; });

                let sheetId = null;
                try {
                    const response = await fetch(GOOGLE_SCRIPT_URL, {
                        method: "POST",
                        headers: { "Content-Type": "text/plain" },
                        body: JSON.stringify({ action: "createProject", projectName: name }),
                        redirect: "follow"
                    });
                    if (response.ok) {
                        const result = await response.json();
                        sheetId = result.spreadsheetId;
                    }
                } catch (err) { console.warn("Google Sheet sync backgrounded."); }

                const newProject = {
                    name, client, hourlyRate: defaultRate, phaseRates,
                    spreadsheetId: sheetId, status: 'In Progress', createdAt: serverTimestamp(),
                };
                
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'projects'), newProject);
                setSyncingSheet(false);
                setCurrentView('dashboard');
            };

            const handleAddExpense = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const itemName = formData.get('itemName');
                const amount = parseFloat(formData.get('amount')) || 0;

                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'logs'), {
                    projectId: activeProject.id, type: 'expense', itemName, amount, timestamp: serverTimestamp()
                });

                if (activeProject.spreadsheetId) {
                    try {
                        fetch(GOOGLE_SCRIPT_URL, {
                            method: "POST",
                            headers: { "Content-Type": "text/plain" },
                            body: JSON.stringify({ action: "logExpense", spreadsheetId: activeProject.spreadsheetId, itemName, amount }),
                            mode: "no-cors"
                        });
                    } catch (err) { console.error("Expense sync failed."); }
                }
                e.target.reset();
            };

            const startTimer = (phase) => {
                setActiveTimer({ startTime: Date.now(), phase, projectId: activeProject.id });
                setShowPhaseDropdown(false);
                setPhaseSearch("");
            };

            const stopTimer = async () => {
                if (!activeTimer) return;
                const durationSeconds = Math.floor((Date.now() - activeTimer.startTime) / 1000);
                const phase = activeTimer.phase;
                const rate = activeProject.phaseRates?.[phase] ?? activeProject.hourlyRate;
                const earned = (durationSeconds / 3600) * rate;

                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'logs'), {
                    projectId: activeTimer.projectId, phase, duration: durationSeconds,
                    timestamp: serverTimestamp(), type: 'time'
                });

                if (activeProject.spreadsheetId) {
                    try {
                        fetch(GOOGLE_SCRIPT_URL, {
                            method: "POST",
                            headers: { "Content-Type": "text/plain" },
                            body: JSON.stringify({
                                action: "logTime", spreadsheetId: activeProject.spreadsheetId,
                                phase, durationSeconds, displayTime: formatTime(durationSeconds),
                                rate, earned: Number(earned.toFixed(2))
                            }),
                            mode: "no-cors"
                        });
                    } catch (err) { console.error("Sheet log failed."); }
                }
                setActiveTimer(null);
            };

            const handlePhotoUpload = async (e) => {
                const file = e.target.files[0];
                if (!file || !activeProject) return;
                setUploading(true);
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = async () => {
                        const canvas = document.createElement('canvas');
                        const MAX = 800;
                        let w = img.width, h = img.height;
                        if (w > h) { if (w > MAX) { h *= MAX / w; w = MAX; } }
                        else { if (h > MAX) { w *= MAX / h; h = MAX; } }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'logs'), {
                            projectId: activeProject.id, imageUrl: canvas.toDataURL('image/jpeg', 0.7),
                            timestamp: serverTimestamp(), type: 'photo',
                            phase: activeTimer ? activeTimer.phase : 'Progress Photo'
                        });
                        setUploading(false);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            const updatePhaseRate = async (phase, newRate) => {
                if (!activeProject) return;
                const updatedRates = { ...activeProject.phaseRates, [phase]: parseFloat(newRate) || 0 };
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'projects', activeProject.id), {
                    phaseRates: updatedRates
                });
            };

            if (loading) return (
                <div className="flex flex-col items-center justify-center h-screen bg-indigo-50 gap-4">
                    <SLSLogo className="w-24 h-24 animate-pulse" />
                    <span className="font-black text-indigo-600 tracking-widest uppercase text-xs">Loading SLS Time...</span>
                </div>
            );

            const filteredPhases = PHASES.filter(p => p.toLowerCase().includes(phaseSearch.toLowerCase()));
            const stats = getStats(timeLogs);

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 font-sans pb-20 overflow-x-hidden">
                    {deletingProjectId && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center">
                                <div className="w-16 h-16 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="trash" size={32} /></div>
                                <h3 className="text-xl font-black text-slate-800 mb-2">Delete Project?</h3>
                                <div className="flex gap-3 mt-6">
                                    <button onClick={() => setDeletingProjectId(null)} className="flex-1 px-4 py-3 rounded-2xl font-bold bg-slate-100 text-slate-600">Keep It</button>
                                    <button onClick={async () => { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'projects', deletingProjectId)); setDeletingProjectId(null); }} className="flex-1 px-4 py-3 rounded-2xl font-bold bg-rose-500 text-white">Delete</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showLinkModal && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full">
                                <h3 className="text-xl font-black text-slate-800 mb-2">Link Google Sheet</h3>
                                <form onSubmit={async (e) => {
                                    e.preventDefault();
                                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'projects', activeProject.id), { spreadsheetId: e.target.sheetId.value.trim() });
                                    setShowLinkModal(false);
                                }} className="space-y-4">
                                    <input name="sheetId" placeholder="Paste Sheet ID here..." required className="w-full p-4 rounded-2xl border-2 border-slate-100 outline-none focus:border-indigo-500 font-medium" />
                                    <div className="flex gap-2">
                                        <button type="button" onClick={() => setShowLinkModal(false)} className="flex-1 p-3 font-bold text-slate-400">Cancel</button>
                                        <button type="submit" className="flex-1 p-3 font-bold bg-indigo-600 text-white rounded-xl text-xs uppercase tracking-widest">Save Link</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    <header className="bg-white p-4 sticky top-0 z-10 shadow-sm border-b border-slate-200">
                        <div className="max-w-4xl mx-auto flex justify-between items-center px-2">
                            <h1 className="text-xl font-black flex items-center gap-3 tracking-tighter"><SLSLogo className="w-8 h-8" /> SLS Time</h1>
                            {(uploading || syncingSheet) && <div className="bg-emerald-500 text-white text-[10px] px-2 py-1 rounded animate-pulse font-black uppercase tracking-widest">Syncing...</div>}
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto p-4">
                        {currentView === 'dashboard' && (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center px-2">
                                    <h2 className="text-2xl font-black text-slate-800">Projects</h2>
                                    <button onClick={() => setCurrentView('add_project')} className="bg-indigo-600 text-white px-5 py-2.5 rounded-2xl flex items-center gap-2 shadow-lg hover:bg-indigo-700 transition active:scale-95"><Icon name="plus" /> Create New</button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 px-2">
                                    {projects.length === 0 ? (
                                        <div className="col-span-full py-20 text-center bg-white rounded-3xl border-2 border-dashed border-slate-200 flex flex-col items-center gap-4">
                                            <SLSLogo className="w-16 h-16 opacity-20 grayscale" />
                                            <p className="text-slate-400 font-medium font-bold uppercase tracking-tight text-xs">No active pieces</p>
                                        </div>
                                    ) : (
                                        projects.map(p => {
                                            const pStats = getStats(timeLogs.filter(l => l.projectId === p.id), p);
                                            return (
                                                <div key={p.id} className="relative group">
                                                    <div onClick={() => { setActiveProject(p); setCurrentView('project_detail'); }} className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 cursor-pointer hover:border-indigo-200 transition-all active:bg-indigo-50 flex flex-col h-full">
                                                        <h3 className="font-black text-xl text-slate-800 pr-8 truncate mb-1">{p.name}</h3>
                                                        <p className="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-8">{p.client}</p>
                                                        <div className="mt-auto grid grid-cols-2 gap-4 pt-4 border-t border-slate-50 relative">
                                                            <div><p className="text-[10px] font-bold text-slate-300 uppercase tracking-tighter">Value</p><p className="font-black text-emerald-600 flex items-center gap-1 text-sm"><Icon name="wallet" size={14} /> {pStats.totalValue}</p></div>
                                                            <div><p className="text-[10px] font-bold text-slate-300 uppercase tracking-tighter">Time</p><p className="font-black text-slate-700 flex items-center gap-1 text-sm"><Icon name="clock" size={14} className="text-indigo-500" /> {pStats.displayTime}</p></div>
                                                            <div className="absolute -top-3 right-0"><span className="bg-slate-50 text-slate-500 text-[9px] font-black uppercase px-2 py-1 rounded-md border border-slate-100">{p.status}</span></div>
                                                        </div>
                                                    </div>
                                                    <button onClick={(e) => { e.stopPropagation(); setDeletingProjectId(p.id); }} className="absolute top-4 right-4 p-2 text-slate-200 hover:text-rose-500 opacity-0 group-hover:opacity-100 transition-all z-10"><Icon name="trash" size={18} /></button>
                                                </div>
                                            );
                                        })
                                    )}
                                </div>
                            </div>
                        )}

                        {currentView === 'add_project' && (
                            <div className="bg-white p-8 rounded-3xl shadow-sm max-w-lg mx-auto border border-slate-100">
                                <button onClick={() => setCurrentView('dashboard')} className="mb-6 text-slate-400 hover:text-indigo-600 flex items-center gap-1 transition font-bold"><Icon name="left" /> Cancel</button>
                                <h2 className="text-3xl font-black text-slate-800 mb-8">New Commission</h2>
                                <form onSubmit={handleCreateProject} className="space-y-6">
                                    <div><label className="block text-xs font-black uppercase text-slate-400 mb-2 tracking-widest">Project Name</label><input name="name" required className="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:bg-white focus:border-indigo-500 outline-none transition font-bold" /></div>
                                    <div><label className="block text-xs font-black uppercase text-slate-400 mb-2 tracking-widest">Client</label><input name="client" required className="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:bg-white focus:border-indigo-500 outline-none transition font-bold" /></div>
                                    <div><label className="block text-xs font-black uppercase text-slate-400 mb-2 tracking-widest">Base Hourly Rate ($)</label><input name="rate" type="number" step="0.01" defaultValue="45.00" required className="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:bg-white focus:border-indigo-500 outline-none transition font-black" /></div>
                                    <button type="submit" disabled={syncingSheet} className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-xl hover:bg-indigo-700 transition transform active:scale-95">Create Project</button>
                                </form>
                            </div>
                        )}

                        {currentView === 'project_detail' && activeProject && (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center px-2">
                                    <button onClick={() => setCurrentView('dashboard')} className="text-slate-400 hover:text-indigo-600 flex items-center gap-1 transition font-bold"><Icon name="left" /> Dashboard</button>
                                    <div className="flex gap-2">
                                        {activeProject.spreadsheetId ? (
                                            <button onClick={() => window.open(`https://docs.google.com/spreadsheets/d/${activeProject.spreadsheetId}`, '_blank')} className="p-2 rounded-xl bg-white text-emerald-600 border border-slate-200 hover:bg-emerald-50 transition" title="Spreadsheet"><Icon name="sheet" size={20} /></button>
                                        ) : (
                                            <button onClick={() => setShowLinkModal(true)} className="p-2 rounded-xl bg-white text-indigo-400 border border-slate-200 hover:text-indigo-600 transition" title="Link Sheet"><Icon name="link" size={20} /></button>
                                        )}
                                        <button onClick={() => setShowRateEditor(!showRateEditor)} className={`p-2 rounded-xl transition ${showRateEditor ? 'bg-indigo-600 text-white border-transparent' : 'bg-white text-slate-400 border border-slate-200'}`} title="Task Rates"><Icon name="settings" /></button>
                                    </div>
                                </div>

                                {showRateEditor && (
                                    <div className="bg-white p-6 rounded-3xl shadow-md border-2 border-indigo-100 mx-2">
                                        <h3 className="font-black text-slate-800 mb-4 flex items-center gap-2"><Icon name="dollar" size={18} /> Task Rates</h3>
                                        <div className="space-y-3">
                                            {PHASES.map(ph => (
                                                <div key={ph} className="flex items-center justify-between gap-4 p-2 bg-slate-50 rounded-2xl text-xs font-bold text-slate-600">
                                                    <span className="flex-1">{ph}</span>
                                                    <input type="number" step="0.01" defaultValue={activeProject.phaseRates?.[ph] ?? activeProject.hourlyRate} onBlur={(e) => updatePhaseRate(ph, e.target.value)} className="w-16 bg-white p-1 rounded border border-slate-200 text-right font-black" />
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-200 overflow-hidden relative mx-2">
                                    <div className="relative z-10 flex flex-col gap-6">
                                        <div><h2 className="text-3xl font-black text-slate-800">{activeProject.name}</h2><p className="text-slate-400 font-bold uppercase tracking-widest text-xs">{activeProject.client}</p></div>
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 text-center">
                                            <div className="bg-emerald-500 p-4 rounded-2xl text-white shadow-lg shadow-emerald-100">
                                                <p className="text-[9px] font-black uppercase opacity-70 tracking-widest">Total Value</p>
                                                <p className="text-2xl font-black tracking-tighter">{stats.totalValue}</p>
                                            </div>
                                            <div className="bg-indigo-50 p-4 rounded-2xl border border-indigo-100">
                                                <p className="text-[9px] font-black uppercase text-indigo-400 tracking-widest">Labor</p>
                                                <p className="text-xl font-black text-indigo-700 tracking-tighter">{stats.earned}</p>
                                            </div>
                                            <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                                <p className="text-[9px] font-black uppercase text-slate-400 tracking-widest">Materials</p>
                                                <p className="text-xl font-black text-slate-600 tracking-tighter">{stats.materialCost}</p>
                                            </div>
                                            <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                                <p className="text-[9px] font-black uppercase text-slate-400 tracking-widest">Time</p>
                                                <p className="text-xl font-black text-slate-600 tracking-tighter">{stats.displayTime}</p>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="absolute -top-4 -right-4 opacity-5 pointer-events-none"><SLSLogo className="w-48 h-48" /></div>
                                </div>

                                <div className="bg-slate-900 text-white p-8 rounded-3xl shadow-2xl relative mx-2">
                                    {activeTimer ? (
                                        <div className="flex flex-col items-center text-center">
                                            <div className="flex items-center gap-2 bg-indigo-500/20 text-indigo-300 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-[0.2em] mb-4 border border-indigo-500/30 animate-pulse">ACTIVE: {activeTimer.phase}</div>
                                            <div className="text-7xl font-mono font-black mb-10 tabular-nums">{formatTime(elapsedTime)}</div>
                                            <button onClick={stopTimer} className="bg-rose-500 hover:bg-rose-600 p-4 w-full max-w-sm rounded-2xl font-black flex items-center justify-center gap-2 transition active:scale-95"><Icon name="pause" size={24} /> Stop</button>
                                        </div>
                                    ) : (
                                        <div className="space-y-4" ref={dropdownRef}>
                                            <h3 className="text-[10px] font-black uppercase text-slate-500 tracking-widest text-center">Start Recording Time</h3>
                                            <div className="relative w-full max-w-md mx-auto">
                                                <div onClick={() => setShowPhaseDropdown(true)} className="bg-white/5 border border-white/10 rounded-2xl p-4 flex items-center gap-3 cursor-text">
                                                    <Icon name="search" size={20} className="text-slate-500" />
                                                    <input type="text" placeholder="Which task are you starting?" className="bg-transparent border-none outline-none w-full text-white font-bold placeholder:text-slate-600" value={phaseSearch} onChange={(e) => { setPhaseSearch(e.target.value); setShowPhaseDropdown(true); }} onFocus={() => setShowPhaseDropdown(true)} />
                                                    <Icon name="chevronDown" size={20} className={`text-slate-500 transition-transform ${showPhaseDropdown ? 'rotate-180' : ''}`} />
                                                </div>
                                                {showPhaseDropdown && (
                                                    <div className="absolute top-full left-0 right-0 mt-2 bg-slate-800 rounded-2xl overflow-hidden z-[50] shadow-2xl border border-white/10 max-h-64 overflow-y-auto">
                                                        {filteredPhases.length > 0 ? (
                                                            filteredPhases.map(ph => (
                                                                <button key={ph} onClick={() => startTimer(ph)} className="w-full p-4 text-left hover:bg-indigo-600 border-b border-white/5 last:border-0 flex flex-col group">
                                                                    <span className="text-[9px] font-black uppercase text-slate-500 group-hover:text-white/70">${activeProject.phaseRates?.[ph] ?? activeProject.hourlyRate}/hr</span>
                                                                    <span className="text-sm font-bold text-white">{ph}</span>
                                                                </button>
                                                            ))
                                                        ) : (
                                                            <div className="p-4 text-slate-500 text-xs font-bold italic text-center uppercase tracking-widest">No matching tasks</div>
                                                        )}
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <div className="space-y-4 px-2">
                                    <div className="flex bg-slate-200/50 p-1.5 rounded-2xl">
                                        <button onClick={() => setDetailTab('history')} className={`flex-1 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest transition ${detailTab === 'history' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:bg-white/30'}`}>Timeline</button>
                                        <button onClick={() => setDetailTab('expenses')} className={`flex-1 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest transition ${detailTab === 'expenses' ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-500 hover:bg-white/30'}`}>Materials</button>
                                    </div>

                                    {detailTab === 'history' ? (
                                        <div className="space-y-4">
                                            <div className="flex justify-between items-center px-2">
                                                <h3 className="text-xl font-black text-slate-800">History</h3>
                                                {!activeTimer && <label className="text-emerald-600 bg-emerald-50 px-4 py-2 rounded-xl flex items-center gap-2 text-[10px] font-black uppercase cursor-pointer transition active:scale-95 border border-emerald-100 font-black"><Icon name="camera" size={16} /> Add Photo<input type="file" accept="image/*" className="hidden" onChange={handlePhotoUpload} /></label>}
                                            </div>
                                            <div className="space-y-4">
                                                {timeLogs.filter(l => l.type !== 'expense').length > 0 ? (
                                                    timeLogs.filter(l => l.type !== 'expense').map(log => {
                                                        const earnedAmount = calculateEarnedForLog(log, activeProject);
                                                        return (
                                                            <div key={log.id} className="bg-white p-6 rounded-3xl border border-slate-100 flex gap-6 items-start hover:border-indigo-100 transition shadow-sm">
                                                                <div className={`p-3 rounded-2xl shrink-0 ${log.type === 'photo' ? 'bg-emerald-50 text-emerald-600' : 'bg-indigo-50 text-indigo-600'}`}>{log.type === 'photo' ? <Icon name="camera" size={24} /> : <Icon name="clock" size={24} />}</div>
                                                                <div className="flex-1 min-w-0">
                                                                    <div className="flex justify-between items-start mb-2">
                                                                        <div className="min-w-0">
                                                                            <p className="font-black text-slate-800 text-lg leading-tight truncate">{log.phase}</p>
                                                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{log.timestamp ? new Date(log.timestamp.seconds * 1000).toLocaleString() : 'Saving...'}</p>
                                                                        </div>
                                                                        {log.type === 'time' && (
                                                                            <div className="flex flex-col items-end shrink-0 ml-4">
                                                                                <div className="bg-slate-900 text-white px-3 py-1 rounded-full text-[10px] font-black">+{formatTime(log.duration)}</div>
                                                                                <div className="text-emerald-600 font-black text-sm flex items-center gap-1 mt-1"><Icon name="dollar" size={12} />{earnedAmount.toLocaleString('en-US', { minimumFractionDigits: 2 })}</div>
                                                                            </div>
                                                                        )}
                                                                    </div>
                                                                    {log.imageUrl && <div className="mt-4 rounded-2xl overflow-hidden border border-slate-100 shadow-inner bg-slate-50"><img src={log.imageUrl} className="w-full h-auto" alt="Progress" /></div>}
                                                                </div>
                                                            </div>
                                                        );
                                                    })
                                                ) : (
                                                    <div className="py-12 text-center text-slate-400 text-xs font-bold uppercase tracking-widest border-2 border-dashed border-slate-200 rounded-3xl">No entries in timeline</div>
                                                )}
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="space-y-6">
                                            <div className="bg-white p-6 rounded-3xl border border-emerald-100 shadow-sm">
                                                <h3 className="font-black text-slate-800 mb-4 flex items-center gap-2 tracking-tight"><Icon name="tag" size={16} className="text-emerald-500" /> Log Material Cost</h3>
                                                <form onSubmit={handleAddExpense} className="flex flex-col md:flex-row gap-3">
                                                    <input name="itemName" required placeholder="Item (e.g. Blue Cathedral Glass)" className="flex-[2] p-4 rounded-2xl bg-slate-50 font-bold border-2 border-transparent focus:bg-white focus:border-emerald-500 outline-none transition min-w-0" />
                                                    <div className="flex-1 relative min-w-0">
                                                        <span className="absolute left-4 top-1/2 -translate-y-1/2 font-black text-slate-400">$</span>
                                                        <input name="amount" type="number" step="0.01" required placeholder="0.00" className="w-full p-4 pl-8 rounded-2xl bg-slate-50 font-black border-2 border-transparent focus:bg-white focus:border-emerald-500 outline-none transition" />
                                                    </div>
                                                    <button type="submit" className="bg-emerald-600 text-white px-8 py-4 rounded-2xl font-black shadow-lg hover:bg-emerald-700 transition active:scale-95">Add</button>
                                                </form>
                                            </div>
                                            <div className="space-y-3">
                                                {timeLogs.filter(l => l.type === 'expense').length > 0 ? (
                                                    timeLogs.filter(l => l.type !== 'expense').length >= 0 && timeLogs.filter(l => l.type === 'expense').map(exp => (
                                                        <div key={exp.id} className="bg-white p-5 rounded-3xl border border-slate-100 flex justify-between items-center group shadow-sm">
                                                            <div className="flex items-center gap-4 min-w-0">
                                                                <div className="p-3 bg-emerald-50 text-emerald-600 rounded-2xl"><Icon name="tag" size={20} /></div>
                                                                <div className="min-w-0">
                                                                    <p className="font-black text-slate-800 truncate">{exp.itemName}</p>
                                                                    <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">{exp.timestamp ? new Date(exp.timestamp.seconds * 1000).toLocaleDateString() : 'Saving...'}</p>
                                                                </div>
                                                            </div>
                                                            <div className="flex items-center gap-4 shrink-0">
                                                                <p className="text-lg font-black text-emerald-600">${exp.amount.toFixed(2)}</p>
                                                                <button onClick={async () => await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'logs', exp.id))} className="text-slate-200 hover:text-rose-500 opacity-0 group-hover:opacity-100 transition-all"><Icon name="trash" size={16} /></button>
                                                            </div>
                                                        </div>
                                                    ))
                                                ) : (
                                                    <div className="py-12 text-center text-slate-400 text-xs font-bold uppercase tracking-widest border-2 border-dashed border-slate-200 rounded-3xl">No materials logged</div>
                                                )}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>
                    <div className="fixed bottom-6 right-6 flex items-center gap-2 bg-slate-900/95 backdrop-blur-lg text-[9px] text-white font-black uppercase tracking-[0.2em] px-4 py-2 rounded-2xl shadow-2xl z-50">
                        <div className="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse"></div> Studio Sync Active
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
